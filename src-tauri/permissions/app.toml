[[permission]]
identifier = "allow-app-access"
description = "Grants full access to the Document Finder library and core app commands."
# This list MUST stay in sync with `tauri::generate_handler![...]` in
# src/lib.rs. The integration test in tests/permissions_in_sync.rs fails the
# build if they diverge — Tauri 2 silently denies any command not listed here
# and the user only sees "Command X not allowed by ACL" at runtime.
commands.allow = [
  "default_library_dir",
  "start_run",
  "cancel_run",
  "list_libraries",
  "open_library",
  "export_library_zip",
  "reveal_in_finder",
  "run_log_info",
  "run_log_tail",
  "list_models",
  "is_embedding_loaded",
  "embedding_downloaded",
  "warm_embedding",
  "download_model",
  "cancel_model_download",
  "delete_model",
  "delete_library",
  "reset_ai_state",
  "local_searxng_port"
]
