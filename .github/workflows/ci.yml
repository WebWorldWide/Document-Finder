name: CI

on:
  push:
    branches: [main, v2-stabilize-ship]
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]

# Cancel in-flight runs for the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # FAST GATE: permissions sync. Cheap, runs first so a divergence between
  # `tauri::generate_handler!` and `permissions/app.toml` fails the pipeline
  # in under a minute without burning build time.
  # --------------------------------------------------------------------------
  permissions-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test (permissions only)
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol --test permissions_in_sync

  # --------------------------------------------------------------------------
  # FRONTEND: lint, format check, typecheck, vitest, vite build. Stays in
  # ubuntu since none of the test code touches OS-specific behavior.
  # --------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # --------------------------------------------------------------------------
  # BACKEND (fast lane): no heavy AI features. fmt + clippy + unit tests.
  # The full feature build (which includes fastembed ONNX downloads and
  # llama-cpp's cmake/clang build) runs only in `tauri-build-matrix` below.
  # --------------------------------------------------------------------------
  backend-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fast-features

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol --all-targets -- -W warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol

  # --------------------------------------------------------------------------
  # TAURI BUILD MATRIX (slow lane): default features (includes ai-embeddings
  # via fastembed + ai-llm via llama-cpp). Runs on push-to-main and on PRs
  # that carry the `full-build` label so quick docs/CI tweaks don't pay the
  # 10–25 minute cold-cache cost.
  # --------------------------------------------------------------------------
  tauri-build-matrix:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'full-build')
    needs: [permissions-sync]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: full-features-${{ matrix.os }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            clang

      - name: Install Windows build toolchain (cmake + LLVM for llama.cpp)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress cmake llvm
          # cmake/LLVM install via choco lays bin/ on PATH for subsequent steps.
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
