name: CI

# Fast sanity check on every push / PR — verifies the frontend
# typechecks, prettier passes, and `cargo check` builds on macOS,
# Ubuntu, and Windows. Skips the heavy AI features (fastembed + llama)
# so each runner finishes in ~5 min instead of 25 min; the release
# workflow does the full build with --release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,css}" "*.{ts,json}"

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Build frontend bundle
        run: pnpm build

  rust:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check (no AI features — fast)
        working-directory: src-tauri
        run: cargo check --no-default-features --features=custom-protocol
