name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]

# Cancel in-flight runs for the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # FRONTEND: lint, format check, typecheck, vitest, vite build. Also
  # produces the `dist/` artifact the backend jobs need for
  # `tauri::generate_context!()` to find `frontendDist`.
  # --------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      # `--ignore-scripts` bypasses pnpm 11's hard error on unapproved build
      # scripts. esbuild's platform binary ships via the optional
      # `@esbuild/<platform>` packages, so we don't actually need the
      # postinstall script to run.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  # --------------------------------------------------------------------------
  # FAST GATE: permissions sync. Verifies `permissions/app.toml` matches the
  # `tauri::generate_handler!` macro contents. Needs the lib to compile,
  # which needs Linux Tauri deps + a pre-built `dist/` folder.
  # --------------------------------------------------------------------------
  permissions-sync:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: permissions-sync

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: cargo test (permissions only)
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol --test permissions_in_sync

  # --------------------------------------------------------------------------
  # BACKEND (fast lane): no heavy AI features. fmt + clippy + unit tests.
  # --------------------------------------------------------------------------
  backend-fast:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: fast-features

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --features=custom-protocol

  # --------------------------------------------------------------------------
  # BACKEND (AI lane): clippy + tests WITH default features (ai-embeddings +
  # ai-llm) — the code the fast lane never compiles. Without this, clippy
  # violations or broken tests inside `#[cfg(feature = "ai-*")]` blocks reach
  # shipped installers undetected. Gated to push-to-main / `full-build`-labelled
  # PRs (like the build matrix) so quick PRs don't pay the 10–25 min native
  # build (llama.cpp + ONNX). The rust-cache makes repeat runs incremental.
  # --------------------------------------------------------------------------
  backend-ai:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'full-build')
    runs-on: ubuntu-24.04
    needs: [frontend]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ai-features

      - name: Install Linux system deps for Tauri (incl. cmake + clang for llama.cpp)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            cmake \
            clang

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: cargo clippy (default features incl. AI)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test (default features incl. AI)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # --------------------------------------------------------------------------
  # TAURI BUILD MATRIX (slow lane): default features (includes ai-embeddings
  # via fastembed + ai-llm via llama-cpp). Runs on push-to-main and on PRs
  # carrying the `full-build` label so quick CI tweaks don't pay the
  # 10–25 minute cold-cache cost.
  # --------------------------------------------------------------------------
  tauri-build-matrix:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'full-build')
    needs: [permissions-sync, backend-fast, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: full-features-${{ matrix.os }}
          # The Windows full build fills the runner disk, so the cache *save*
          # post-step fails (the build itself succeeds and produces installers).
          # Skip saving on Windows so it can't fail the job.
          save-if: ${{ matrix.os != 'windows-latest' }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      # `--ignore-scripts` bypasses pnpm 11's hard error on unapproved build
      # scripts. esbuild's platform binary ships via the optional
      # `@esbuild/<platform>` packages, so we don't actually need the
      # postinstall script to run.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            clang

      - name: Install Windows build toolchain (cmake + LLVM for llama.cpp)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress cmake llvm
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
