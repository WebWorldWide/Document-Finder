name: Release

# Triggered when a `v*` tag is pushed. Builds installers on each of the
# three desktop OSes, then `tauri-apps/tauri-action@v0` aggregates them
# into a draft GitHub Release. The user reviews and publishes manually
# (releaseDraft: true) — first review prevents an accidental ship.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.label }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macOS (Apple Silicon)
            os: macos-14
            args: --target aarch64-apple-darwin
          # ubuntu-24.04 (glibc 2.39) is required: the `ort` crate's
          # prebuilt ONNX Runtime binary references __isoc23_strtoll etc.
          # (glibc 2.38+ C23 symbols), so linking on 22.04's glibc 2.35
          # fails with "undefined symbol". The produced .deb/.AppImage
          # therefore needs glibc 2.39+ — fine for modern distros.
          - label: Linux (x86_64)
            os: ubuntu-24.04
            args: ""
          - label: Windows (x86_64)
            os: windows-latest
            args: ""

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            clang

      - name: Install macOS build deps
        if: matrix.platform.os == 'macos-14'
        run: |
          # llama-cpp-2 builds llama.cpp via cmake; the runner already
          # has Xcode + cmake but make double-sure cmake is on PATH.
          which cmake

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.os == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Key the cache by the platform so we don't cross-share macOS
          # build artifacts with Linux/Windows.
          key: ${{ matrix.platform.os }}-release

      - uses: pnpm/action-setup@v4
        with:
          # Pinned to 10 — see ci.yml for rationale. pnpm 11's
          # ERR_PNPM_IGNORED_BUILDS breaks install on every platform.
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Document Finder ${{ github.ref_name }}"
          releaseBody: |
            Document Finder ${{ github.ref_name }}

            ## Installers in this release

            | Platform | File | Notes |
            |---|---|---|
            | macOS (Apple Silicon) | `Document.Finder_${{ github.ref_name }}_aarch64.dmg` | Drag to Applications. **Unsigned** — see below. |
            | Linux | `document-finder_${{ github.ref_name }}_amd64.deb` / `*.AppImage` | `.deb` for Debian/Ubuntu, `.AppImage` portable. |
            | Windows | `Document.Finder_${{ github.ref_name }}_x64-setup.exe` / `*.msi` | NSIS installer or MSI. |

            ## First-launch notes (unsigned binaries)

            **macOS** — Gatekeeper will block the unsigned `.app`. After dragging to Applications:
            1. System Settings → Privacy & Security → scroll down
            2. Click **Open Anyway** next to the Document Finder warning
            3. Confirm in the next dialog

            **Windows** — SmartScreen will warn on first run. Click **More info** → **Run anyway**.

            **Linux** — `.AppImage` is portable, no install. Mark it executable:
            `chmod +x Document.Finder_*.AppImage && ./Document.Finder_*.AppImage`

            ## Why unsigned?

            Code signing requires per-OS developer certificates (Apple Developer Program $99/yr,
            Authenticode for Windows). The app makes no outbound connections except to the
            open-access sources you enable. Verify the binary with:
            - macOS: `codesign -dvvv /Applications/Document\ Finder.app`
            - Windows: `Get-AuthenticodeSignature .\document-finder.exe`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}
