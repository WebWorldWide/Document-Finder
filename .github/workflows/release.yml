name: Release

# Triggered when a `v*` tag is pushed. Builds installers on each desktop OS plus
# a Linux Flatpak, then aggregates them into a draft GitHub Release. The user
# reviews and publishes manually (releaseDraft: true).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Fail fast (before any OS build starts) if the pushed tag's version doesn't
  # match all three manifests. The release process is a manual 3-file bump
  # (package.json / Cargo.toml / tauri.conf.json) that's easy to get partially
  # wrong; without this the installers would report a version that disagrees
  # with the tag/release name. Runs once on Linux with portable POSIX tooling.
  verify-version:
    name: Verify tag matches manifests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Assert tag == package.json == Cargo.toml == tauri.conf.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version package.json)
          CONF=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag=$TAG  package.json=$PKG  tauri.conf.json=$CONF  Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$CONF" ] || [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch — tag '$TAG' must equal package.json ($PKG), tauri.conf.json ($CONF), and Cargo.toml ($CARGO). Bump all three before tagging."
            exit 1
          fi

  # Create exactly ONE draft Release for this tag up front. The 3-OS build matrix
  # (fail-fast: false) would otherwise each invoke tauri-action's non-atomic
  # check-then-create and can race into duplicate drafts — or a 422 that drops a
  # platform's installers from the release (tauri-apps/tauri-action#914). Each
  # build leg uploads to this release by id instead of creating its own.
  create-release:
    name: Create draft release
    needs: verify-version
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create (or reuse) the draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Reuse an existing DRAFT for this tag if the workflow is re-run, but
          # NEVER an already-published release: matching a published release here
          # would let the build matrix silently overwrite shipped installers with
          # no review gate. Filtering on draft==true means a published tag yields
          # empty, so a re-release must first delete the published release (a
          # deliberate act) before this re-creates a fresh draft.
          release_id=$(gh api "repos/$GH_REPO/releases" --paginate \
            --jq "[.[] | select(.tag_name==\"$GITHUB_REF_NAME\" and .draft==true)][0].id // empty")
          if [ -z "$release_id" ]; then
            printf '%s\n' \
              'Native installers for **macOS** (Apple Silicon `.dmg`), **Windows** (`.exe`, `.msi`), and **Linux** (Flatpak, `.deb`, `.rpm`, `.AppImage`).' \
              '' \
              'The apps are **unsigned** (the macOS build is **ad-hoc signed**, which removes the "app is damaged" error). First launch:' \
              '' \
              '- **macOS** — right-click the app → **Open**, then confirm. If macOS still refuses, clear the download quarantine:' \
              '  ```' \
              '  xattr -dr com.apple.quarantine "/Applications/Document Finder.app"' \
              '  ```' \
              '- **Windows** — SmartScreen → **More info** → **Run anyway**.' \
              '- **Linux** — the `.deb`/`.rpm`/AppImage need glibc 2.39+ (built on Ubuntu 24.04); the Flatpak ships its own runtime.' \
              > notes.md
            release_id=$(gh api -X POST "repos/$GH_REPO/releases" \
              -f tag_name="$GITHUB_REF_NAME" \
              -f name="Document Finder $GITHUB_REF_NAME" \
              -F body=@notes.md \
              -F draft=true -F prerelease=false \
              --jq '.id')
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform.label }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macOS (Apple Silicon)
            os: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          # NOTE: no Intel (x86_64-apple-darwin) leg — GitHub's macos-13 Intel
          # runners queue unpredictably and were stalling the whole release
          # (and gating the Flatpak job). Apple Silicon is the default Mac target;
          # Intel users can run the arm64 build under Rosetta 2 if needed.
          # ubuntu-24.04 (glibc 2.39) is required: the `ort` crate's prebuilt
          # ONNX Runtime binary references glibc 2.38+ C23 symbols, so linking
          # on 22.04's glibc 2.35 fails. The .deb/.AppImage need glibc 2.39+.
          - label: Linux (x86_64)
            os: ubuntu-24.04
            args: ""
            rust_target: ""
          - label: Windows (x86_64)
            os: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            clang

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform.os }}-release
          # The Windows full build fills the runner disk; skip the cache save so
          # its post-step can't fail the job (the build itself is unaffected).
          save-if: ${{ matrix.platform.os != 'windows-latest' }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      # `--ignore-scripts` sidesteps pnpm 11's unapproved-build hard error;
      # esbuild's binary ships in its platform package, so its postinstall
      # isn't needed.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign the macOS bundle (also pinned in tauri.conf.json). On
          # Apple Silicon an unsigned, downloaded (quarantined) arm64 app fails
          # Gatekeeper with the unrecoverable "is damaged" verdict; '-' is the
          # ad-hoc pseudo-identity (no Apple Developer account needed). No-op on
          # Windows/Linux legs.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          # Upload to the single pre-created draft by id — no tagName/releaseName
          # here, so the matrix legs can't race to create competing drafts.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.args }}

  # Repackage the Linux .deb into a Flatpak bundle and attach it to the draft
  # release. Self-contained (builds its own .deb) so it can't be broken by, or
  # break, the matrix above.
  flatpak:
    name: Build Linux Flatpak
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system + Flatpak deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            cmake clang flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          # GNOME runtime (not the bare freedesktop one): only the GNOME runtime
          # bundles WebKitGTK, which the Tauri app dlopen's at launch. Keep this
          # version in lockstep with runtime-version in the Flatpak manifest.
          flatpak install --user -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: flatpak-linux

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build .deb
        run: pnpm tauri build --bundles deb

      - name: Stage .deb for the Flatpak manifest
        run: cp src-tauri/target/release/bundle/deb/*.deb packaging/flatpak/document-finder.deb

      - name: Build Flatpak bundle
        working-directory: packaging/flatpak
        run: |
          set -euo pipefail
          flatpak-builder --user --force-clean --repo=repo build-dir com.webworldwide.DocumentFinder.yml
          # Smoke test: a successful build does NOT prove the runtime provides
          # every shared library the app dlopen's (e.g. libwebkit2gtk-4.1). Run
          # ldd inside the build environment and fail loudly on any unresolved
          # lib, so a wrong/EOL runtime can never ship a dead-on-arrival bundle.
          echo "Verifying shared-library resolution inside the runtime…"
          ldd_out=$(flatpak-builder --run build-dir com.webworldwide.DocumentFinder.yml ldd /app/bin/document-finder)
          echo "$ldd_out"
          if echo "$ldd_out" | grep -q "not found"; then
            echo "::error::Flatpak runtime is missing a shared library the app needs (see 'not found' above) — bump runtime-version or fix the manifest."
            exit 1
          fi
          # Use the bare semver (strip the tag's leading `v`) so this asset's
          # name matches every tauri-action bundle (.dmg/.deb/.exe/…), which are
          # named from tauri.conf.json's version, not the `v`-prefixed tag.
          VERSION="${GITHUB_REF_NAME#v}"
          flatpak build-bundle repo "Document Finder_${VERSION}_x86_64.flatpak" com.webworldwide.DocumentFinder

      - name: Upload Flatpak to the draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" packaging/flatpak/*.flatpak --clobber
